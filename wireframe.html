<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacPerf Wireframe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    height: 100vh;
    transition: background 0.4s, color 0.4s;
  }

  .window {
    display: flex;
    flex-direction: column;
    height: 100vh;
    border-radius: 10px;
    overflow: hidden;
  }

  .titlebar {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    -webkit-app-region: drag;
    transition: background 0.4s, border-color 0.4s;
  }
  .traffic-light { width: 12px; height: 12px; border-radius: 50%; }
  .tl-close { background: #ff5f57; }
  .tl-min { background: #febc2e; }
  .tl-max { background: #28c840; }
  .titlebar-text {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.4s;
  }
  .titlebar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Theme switcher */
  .theme-switcher {
    display: flex;
    gap: 4px;
    background: rgba(128,128,128,0.15);
    border-radius: 6px;
    padding: 3px;
  }
  .theme-btn {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .theme-btn:hover { transform: scale(1.15); }
  .theme-btn.active { border-color: rgba(255,255,255,0.6); }
  .theme-btn[data-theme="dark"] { background: #1a1a1e; }
  .theme-btn[data-theme="light"] { background: #f5f5f7; }
  .theme-btn[data-theme="neon"] { background: linear-gradient(135deg, #0a0a0f, #1a0030); }
  .theme-btn[data-theme="mono"] { background: linear-gradient(135deg, #1c1c1e, #3a3a3c); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 220px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    transition: background 0.4s, border-color 0.4s;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 10px;
  }

  .sidebar-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .sidebar-info { flex: 1; min-width: 0; }
  .sidebar-name { font-size: 13px; font-weight: 600; }
  .sidebar-value {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 1px;
  }
  .sidebar-spark { width: 64px; height: 28px; flex-shrink: 0; }

  .detail {
    flex: 1;
    padding: 28px 32px;
    overflow-y: auto;
    transition: background 0.4s;
  }

  .metric-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .metric-header-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .metric-header-name { font-size: 22px; font-weight: 700; flex: 1; }
  .metric-header-value {
    font-size: 48px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }

  .graph-container {
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
    transition: background 0.4s, border-color 0.4s;
  }
  .graph-canvas { width: 100%; height: 220px; position: relative; }
  .graph-y-axis {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 10px;
    padding: 2px 0;
    transition: color 0.4s;
  }
  .graph-area { position: absolute; left: 44px; top: 0; right: 0; bottom: 0; }
  .graph-area canvas { width: 100%; height: 100%; }
  .graph-label {
    font-size: 11px;
    margin-top: 8px;
    text-align: center;
    transition: color 0.4s;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    border-radius: 10px;
    padding: 14px 16px;
    transition: background 0.4s, border-color 0.4s;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    transition: color 0.4s;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-subtitle { font-size: 11px; margin-top: 2px; transition: color 0.4s; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    transition: color 0.4s;
  }
  .cores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
    gap: 6px;
  }
  .core-bar-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .core-bar-track {
    width: 100%; height: 48px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: background 0.4s;
  }
  .core-bar-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    border-radius: 4px;
    transition: height 0.5s ease;
  }
  .core-label { font-size: 9px; transition: color 0.4s; }

  .composition-bar { display: flex; height: 24px; border-radius: 6px; overflow: hidden; gap: 2px; }
  .comp-segment { transition: width 0.5s ease; }
  .comp-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .comp-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; transition: color 0.4s; }
  .comp-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .graph-legend { display: flex; gap: 20px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; transition: color 0.4s; }
  .legend-line { width: 16px; height: 3px; border-radius: 2px; }

  /* Pressure gauge */
  .pressure-section {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
  }
  .pressure-gauge {
    width: 140px;
    height: 80px;
    position: relative;
    flex-shrink: 0;
  }
  .pressure-gauge canvas { width: 100%; height: 100%; }
  .pressure-label-text {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pressure-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .pressure-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .pressure-desc { font-size: 12px; line-height: 1.5; }

  /* Process table */
  .process-search {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
    transition: background 0.4s, border-color 0.4s, color 0.4s;
  }
  .search-wrapper {
    position: relative;
    margin-bottom: 16px;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.4;
  }
  .process-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .process-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    transition: color 0.4s, border-color 0.4s;
  }
  .process-table th:hover { opacity: 0.8; }
  .process-table th .sort-arrow { font-size: 9px; margin-left: 4px; }
  .process-table td {
    padding: 7px 12px;
    font-variant-numeric: tabular-nums;
    transition: border-color 0.4s;
  }
  .process-table tr { transition: background 0.1s; }
  .process-name { font-weight: 500; }
  .process-bar {
    height: 4px;
    border-radius: 2px;
    min-width: 2px;
    display: inline-block;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* Neon glow effects */
  .neon-glow-line { filter: none; transition: filter 0.4s; }
  body.theme-neon .neon-glow-line { filter: url(#glow); }
</style>
</head>
<body class="theme-dark">
<svg style="position:absolute;width:0;height:0">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div class="window">
  <div class="titlebar" id="titlebar">
    <div class="traffic-light tl-close"></div>
    <div class="traffic-light tl-min"></div>
    <div class="traffic-light tl-max"></div>
    <div class="titlebar-text" id="titlebar-text">MacPerf</div>
    <div class="titlebar-right">
      <div class="theme-switcher">
        <div class="theme-btn active" data-theme="dark" title="Dark" onclick="setTheme('dark')"></div>
        <div class="theme-btn" data-theme="light" title="Light" onclick="setTheme('light')"></div>
        <div class="theme-btn" data-theme="neon" title="Neon" onclick="setTheme('neon')"></div>
        <div class="theme-btn" data-theme="mono" title="Monochrome" onclick="setTheme('mono')"></div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="detail" id="detail"></div>
  </div>
</div>

<script>
// ─── Themes ───
const themes = {
  dark: {
    body: { bg: '#1a1a1e', text: '#e5e5ea' },
    titlebar: { bg: '#2c2c2e', border: '#3a3a3c', text: '#98989d' },
    sidebar: { bg: '#252528', border: '#3a3a3c', hover: '#3a3a3c', active: '#3a3a3c' },
    detail: { bg: '#1a1a1e' },
    card: { bg: '#252528', border: '#3a3a3c' },
    graph: { bg: '#252528', border: '#3a3a3c', grid: '#3a3a3c' },
    label: '#8e8e93', sublabel: '#636366', dimBg: 0.15,
    input: { bg: '#252528', border: '#3a3a3c', text: '#e5e5ea' },
    tableRow: { hover: 'rgba(255,255,255,0.04)', border: '#2c2c2e' },
    coreTrack: '#3a3a3c',
    accents: { cpu: '#4A90D9', memory: '#9B59B6', disk: '#27AE60', network: '#E67E22', gpu: '#1ABC9C', processes: '#8E8E93' },
    glowEnabled: false,
  },
  light: {
    body: { bg: '#f5f5f7', text: '#1d1d1f' },
    titlebar: { bg: '#e8e8ed', border: '#d2d2d7', text: '#6e6e73' },
    sidebar: { bg: '#ffffff', border: '#d2d2d7', hover: '#f0f0f5', active: '#e8e8ed' },
    detail: { bg: '#f5f5f7' },
    card: { bg: '#ffffff', border: '#d2d2d7' },
    graph: { bg: '#ffffff', border: '#d2d2d7', grid: '#e8e8ed' },
    label: '#6e6e73', sublabel: '#8e8e93', dimBg: 0.1,
    input: { bg: '#ffffff', border: '#d2d2d7', text: '#1d1d1f' },
    tableRow: { hover: 'rgba(0,0,0,0.03)', border: '#e8e8ed' },
    coreTrack: '#e8e8ed',
    accents: { cpu: '#2563EB', memory: '#7C3AED', disk: '#059669', network: '#D97706', gpu: '#0D9488', processes: '#6B7280' },
    glowEnabled: false,
  },
  neon: {
    body: { bg: '#0a0a0f', text: '#e0e0ff' },
    titlebar: { bg: '#111118', border: '#1a1a2e', text: '#6060a0' },
    sidebar: { bg: '#0e0e16', border: '#1a1a2e', hover: '#1a1a2e', active: '#1f1f35' },
    detail: { bg: '#0a0a0f' },
    card: { bg: '#111118', border: '#1a1a2e' },
    graph: { bg: '#0e0e16', border: '#1a1a2e', grid: '#1a1a2e' },
    label: '#6060a0', sublabel: '#404070', dimBg: 0.2,
    input: { bg: '#111118', border: '#1a1a2e', text: '#e0e0ff' },
    tableRow: { hover: 'rgba(100,100,255,0.06)', border: '#151520' },
    coreTrack: '#1a1a2e',
    accents: { cpu: '#00BFFF', memory: '#BF40FF', disk: '#39FF14', network: '#FF6600', gpu: '#00FFD5', processes: '#9090FF' },
    glowEnabled: true,
  },
  mono: {
    body: { bg: '#1c1c1e', text: '#d1d1d6' },
    titlebar: { bg: '#2c2c2e', border: '#3a3a3c', text: '#8e8e93' },
    sidebar: { bg: '#232325', border: '#3a3a3c', hover: '#3a3a3c', active: '#3a3a3c' },
    detail: { bg: '#1c1c1e' },
    card: { bg: '#232325', border: '#3a3a3c' },
    graph: { bg: '#232325', border: '#3a3a3c', grid: '#3a3a3c' },
    label: '#8e8e93', sublabel: '#636366', dimBg: 0.12,
    input: { bg: '#232325', border: '#3a3a3c', text: '#d1d1d6' },
    tableRow: { hover: 'rgba(255,255,255,0.04)', border: '#2c2c2e' },
    coreTrack: '#3a3a3c',
    accents: { cpu: '#5AC8FA', memory: '#5AC8FA', disk: '#5AC8FA', network: '#5AC8FA', gpu: '#5AC8FA', processes: '#5AC8FA' },
    glowEnabled: false,
  },
};

let currentTheme = 'dark';
function T() { return themes[currentTheme]; }

function setTheme(name) {
  currentTheme = name;
  const t = T();
  document.body.style.background = t.body.bg;
  document.body.style.color = t.body.text;
  document.body.className = 'theme-' + name;

  document.getElementById('titlebar').style.background = t.titlebar.bg;
  document.getElementById('titlebar').style.borderBottom = '1px solid ' + t.titlebar.border;
  document.getElementById('titlebar-text').style.color = t.titlebar.text;

  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === name);
    b.style.borderColor = b.dataset.theme === name ?
      (name === 'light' ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.6)') : 'transparent';
  });

  renderSidebar();
  renderDetail();
}

// ─── Categories ───
const categories = [
  { id: 'cpu', name: 'CPU' },
  { id: 'memory', name: 'Memory' },
  { id: 'disk', name: 'Disk' },
  { id: 'network', name: 'Network' },
  { id: 'gpu', name: 'GPU' },
  { id: 'processes', name: 'Processes' },
];

const icons = {
  cpu: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="1" x2="10" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="12" x2="6" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="12" x2="10" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="6" x2="4" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="10" x2="4" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  memory: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="4.5" y="6.5" width="2" height="3" rx="0.5" stroke="currentColor" stroke-width="1"/><rect x="9.5" y="6.5" width="2" height="3" rx="0.5" stroke="currentColor" stroke-width="1"/></svg>`,
  disk: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="0.75" fill="currentColor"/></svg>`,
  network: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 5 L8 9 L11 3 L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="14" cy="7" r="1.5" fill="currentColor"/></svg>`,
  gpu: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3.5" y="7" width="4" height="3" rx="0.75" stroke="currentColor" stroke-width="1"/><line x1="10" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="10" y1="8.5" x2="12.5" y2="8.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="10" y1="10" x2="12.5" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="3" x2="4" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="3" x2="8" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="3" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  processes: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="3" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="6.5" width="12" height="3" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="11" width="12" height="3" rx="1" stroke="currentColor" stroke-width="1.2"/><circle cx="4.5" cy="3.5" r="0.75" fill="currentColor"/><circle cx="4.5" cy="8" r="0.75" fill="currentColor"/><circle cx="4.5" cy="12.5" r="0.75" fill="currentColor"/></svg>`,
};

// ─── Simulated data ───
const data = {};
const POINTS = 60;

function initData() {
  categories.forEach(c => {
    data[c.id] = { history: [], current: 0 };
    for (let i = 0; i < POINTS; i++) data[c.id].history.push(0);
  });
}

function generateValue(id, prev) {
  const ranges = { cpu: [15,45], memory: [55,75], disk: [5,30], network: [3,25], gpu: [10,40], processes: [0,0] };
  if (id === 'processes') return 0;
  const [lo, hi] = ranges[id];
  const mid = (lo + hi) / 2;
  const jitter = (Math.random() - 0.5) * 12;
  const pull = (mid - prev) * 0.1;
  return Math.max(lo - 5, Math.min(hi + 10, prev + jitter + pull));
}

function updateData() {
  categories.forEach(c => {
    const d = data[c.id];
    const prev = d.current || (c.id === 'memory' ? 65 : 25);
    d.current = generateValue(c.id, prev);
    d.history.push(d.current);
    if (d.history.length > POINTS) d.history.shift();
  });
}

const secondaryData = {};
function initSecondary() {
  ['disk','network'].forEach(id => {
    secondaryData[id] = [];
    for (let i = 0; i < POINTS; i++) secondaryData[id].push(0);
  });
}
function updateSecondary() {
  ['disk','network'].forEach(id => {
    const prev = secondaryData[id][secondaryData[id].length-1] || 10;
    const jitter = (Math.random() - 0.5) * 8;
    secondaryData[id].push(Math.max(1, Math.min(30, prev + jitter + (10 - prev) * 0.1)));
    if (secondaryData[id].length > POINTS) secondaryData[id].shift();
  });
}

// Fake processes
const processNames = [
  'Google Chrome', 'Xcode', 'Finder', 'WindowServer', 'Safari', 'Terminal', 'Mail',
  'Spotlight', 'Docker', 'Slack', 'kernel_task', 'mds_stores', 'cloudd',
  'nsurlsessiond', 'bird', 'distnoted', 'logd', 'launchd', 'syslogd',
  'com.apple.WebKit', 'node', 'swift-frontend', 'lldb', 'Activity Monitor',
  'Notes', 'Music', 'Messages', 'Photos', 'Preview', 'TextEdit'
];
let fakeProcesses = processNames.map((name, i) => ({
  pid: 100 + i * 37 + Math.floor(Math.random() * 20),
  name,
  cpu: 0, mem: 0, gpu: 0, energy: 0, threads: 0, state: 'Running'
}));

function updateProcesses() {
  fakeProcesses.forEach(p => {
    const isHeavy = ['Google Chrome','Xcode','Docker','WindowServer','kernel_task','node','swift-frontend'].includes(p.name);
    const isGpuUser = ['Google Chrome','WindowServer','Safari','Xcode','Photos','Preview','com.apple.WebKit'].includes(p.name);
    const baseCpu = isHeavy ? 8 : 0.5;
    const baseMem = isHeavy ? 400 : 30;
    const baseGpu = isGpuUser ? 6 : 0;
    p.cpu = Math.max(0, baseCpu + (Math.random() - 0.4) * baseCpu * 1.5);
    p.mem = Math.max(5, baseMem + (Math.random() - 0.5) * baseMem * 0.3);
    p.gpu = Math.max(0, baseGpu + (Math.random() - 0.3) * baseGpu * 1.2);
    // Energy: weighted combo of cpu + gpu + a base idle cost
    const energyScore = p.cpu * 1.0 + p.gpu * 1.5 + (isHeavy ? 2 : 0.1);
    p.energy = Math.max(0, energyScore + (Math.random() - 0.5) * 3);
    p.threads = Math.floor(isHeavy ? 15 + Math.random() * 30 : 2 + Math.random() * 8);
    p.state = Math.random() > 0.05 ? 'Running' : 'Sleeping';
  });
}

function drawSparkline(canvas, points, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (points.length < 2) return;
  const step = w / (points.length - 1);
  ctx.beginPath();
  points.forEach((v, i) => {
    const x = i * step, y = h - (v / 100) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '08');
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawMainGraph(canvas, histories, colors, maxVal = 100) {
  const t = T();
  const ctx = canvas.getContext('2d');
  const dpr = 2;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y);
    ctx.strokeStyle = t.graph.grid; ctx.lineWidth = 1; ctx.stroke();
  }

  histories.forEach((points, idx) => {
    if (points.length < 2) return;
    const color = colors[idx];
    const step = w / (points.length - 1);
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
      const x = i * step, y = h - (points[i] / maxVal) * h;
      if (i === 0) { ctx.moveTo(x, y); continue; }
      const prevX = (i-1) * step, prevY = h - (points[i-1] / maxVal) * h;
      const cpx = (prevX + x) / 2;
      ctx.bezierCurveTo(cpx, prevY, cpx, y, x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = t.glowEnabled ? 3 : 2.5;
    ctx.lineJoin = 'round';
    if (t.glowEnabled) { ctx.shadowColor = color; ctx.shadowBlur = 12; }
    ctx.stroke();
    ctx.shadowBlur = 0;

    const lastX = (points.length - 1) * step;
    ctx.lineTo(lastX, h); ctx.lineTo(0, h); ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + (t.glowEnabled ? '50' : '35'));
    grad.addColorStop(1, color + '05');
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

function drawPressureGauge(canvas, pressure) {
  const t = T();
  const ctx = canvas.getContext('2d');
  const dpr = 2;
  canvas.width = 280; canvas.height = 160;
  canvas.style.width = '140px'; canvas.style.height = '80px';
  ctx.scale(dpr, dpr);
  const cx = 70, cy = 72, r = 55, lw = 10;
  const startAngle = Math.PI * 0.8;
  const endAngle = Math.PI * 0.2 + Math.PI;
  const totalArc = endAngle - startAngle;

  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = t.coreTrack;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Colored segments
  const segments = [
    { end: 0.5, color: '#34C759' },
    { end: 0.75, color: '#FFD60A' },
    { end: 1.0, color: '#FF3B30' },
  ];
  let prev = 0;
  segments.forEach(seg => {
    if (pressure / 100 <= prev) return;
    const segEnd = Math.min(pressure / 100, seg.end);
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle + totalArc * prev, startAngle + totalArc * segEnd);
    ctx.strokeStyle = seg.color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    if (t.glowEnabled) { ctx.shadowColor = seg.color; ctx.shadowBlur = 10; }
    ctx.stroke();
    ctx.shadowBlur = 0;
    prev = seg.end;
  });

  // Needle
  const needleAngle = startAngle + totalArc * (pressure / 100);
  const nx = cx + Math.cos(needleAngle) * (r - 20);
  const ny = cy + Math.sin(needleAngle) * (r - 20);
  ctx.beginPath();
  ctx.moveTo(cx, cy); ctx.lineTo(nx, ny);
  ctx.strokeStyle = t.body.text;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = t.body.text;
  ctx.fill();
}

      <div class="stat-card" style="background:${t.card.bg};border:1px solid ${t.card.border}"><div class="stat-label" style="color:${t.label}">Total CPU</div><div class="stat-value" style="color:${accent('cpu')}">${totalCpu.toFixed(1)}%</div></div>
      <div class="stat-card" style="background:${t.card.bg};border:1px solid ${t.card.border}"><div class="stat-label" style="color:${t.label}">Total Memory</div><div class="stat-value" style="color:${accent('memory')}">${(totalMem/1024).toFixed(1)} GB</div></div>
      <div class="stat-card" style="background:${t.card.bg};border:1px solid ${t.card.border}"><div class="stat-label" style="color:${t.label}">Total GPU</div><div class="stat-value" style="color:${accent('gpu')}">${totalGpu.toFixed(1)}%</div></div>
      <div class="stat-card" style="background:${t.card.bg};border:1px solid ${t.card.border}"><div class="stat-label" style="color:${t.label}">Threads</div><div class="stat-value">${fakeProcesses.reduce((s,p)=>s+p.threads,0)}</div></div>
    </div>
    <div class="search-wrapper">
      <div class="search-icon">&#x1F50D;</div>
      <input class="process-search" id="processSearchInput" type="text" placeholder="Search processes..." value="${processSearch}" style="background:${t.input.bg};border-color:${t.input.border};color:${t.input.text}">
    </div>
    <div style="background:${t.card.bg};border:1px solid ${t.card.border};border-radius:10px;overflow:hidden">
      <table class="process-table">
        <thead>
          <tr>
            <th style="${thStyle}" data-col="name">Name${arrow('name')}</th>
            <th style="${thStyle}" data-col="pid">PID${arrow('pid')}</th>
            <th style="${thStyle}" data-col="cpu">CPU %${arrow('cpu')}</th>
            <th style="${thStyle}" data-col="mem">Memory${arrow('mem')}</th>
            <th style="${thStyle}" data-col="gpu">GPU %${arrow('gpu')}</th>
            <th style="${thStyle}" data-col="energy">Energy${arrow('energy')}</th>
            <th style="${thStyle}" data-col="threads">Threads${arrow('threads')}</th>
            <th style="${thStyle}" data-col="state">State${arrow('state')}</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.slice(0, 20).map(p => `
            <tr style="border-bottom:1px solid ${t.tableRow.border}" onmouseenter="this.style.background='${t.tableRow.hover}'" onmouseleave="this.style.background='transparent'">
              <td style="border:0" class="process-name">${p.name}</td>
              <td style="border:0;color:${t.sublabel}">${p.pid}</td>
              <td style="border:0"><span style="color:${accent('cpu')}">${p.cpu.toFixed(1)}%</span><div class="process-bar" style="width:${Math.min(80,p.cpu*2)}px;background:${accent('cpu')}${t.glowEnabled?';box-shadow:0 0 6px '+accent('cpu'):''}"></div></td>
              <td style="border:0">${p.mem >= 1024 ? (p.mem/1024).toFixed(1)+' GB' : Math.round(p.mem)+' MB'}</td>
              <td style="border:0"><span style="color:${p.gpu > 0.5 ? accent('gpu') : t.sublabel}">${p.gpu > 0.1 ? p.gpu.toFixed(1)+'%' : '-'}</span>${p.gpu > 0.5 ? '<div class="process-bar" style="width:'+Math.min(60,p.gpu*2)+'px;background:'+accent('gpu')+(t.glowEnabled?';box-shadow:0 0 6px '+accent('gpu'):'')+'"</div>' : ''}</td>
              <td style="border:0"><span style="color:${p.energy > 15 ? '#FF3B30' : p.energy > 5 ? '#FFD60A' : accent('disk')}">${p.energy > 15 ? 'High' : p.energy > 5 ? 'Medium' : 'Low'}</span><div class="process-bar" style="width:${Math.min(50, p.energy * 2)}px;background:${p.energy > 15 ? '#FF3B30' : p.energy > 5 ? '#FFD60A' : accent('disk')}${t.glowEnabled?';box-shadow:0 0 6px '+(p.energy>15?'#FF3B30':p.energy>5?'#FFD60A':accent('disk')):''}"></div></td>
              <td style="border:0">${p.threads}</td>
              <td style="border:0;color:${p.state==='Running'?accent('disk'):t.sublabel}">${p.state}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Wire up events
  document.getElementById('processSearchInput').addEventListener('input', e => {
    processSearch = e.target.value;
    renderProcessView(detail);
    // Re-focus and restore cursor
    const inp = document.getElementById('processSearchInput');
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
  });

  document.querySelectorAll('.process-table th').forEach(th => {
    th.addEventListener('click', () => {
      const c = th.dataset.col;
      if (processSortCol === c) processSortAsc = !processSortAsc;
      else { processSortCol = c; processSortAsc = c === 'name' || c === 'state'; }
      renderProcessView(detail);
    });
  });
}

// ─── Init ───
initData(); initSecondary();
for (let i = 0; i < POINTS; i++) { updateData(); updateSecondary(); }
updateProcesses();
setTheme('dark');

setInterval(() => {
  updateData();
  updateSecondary();
  updateProcesses();
  renderSidebar();
  renderDetail();
}, 1000);
</script>
</body>
</html>
